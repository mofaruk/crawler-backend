global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "crawler-api"
    static_configs:
      - targets: ["crawler_api:9090"]
    metrics_path: /metrics

  - job_name: "crawler-workers"
    dns_sd_configs:
      - names: ["crawler_worker"]
        type: A
        port: 9090
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
